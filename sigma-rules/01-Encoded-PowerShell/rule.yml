title: Detect Encoded PowerShell Execution
id: 6c2d2c2f-4e7a-4d5e-a1b3-000000000001
status: experimental
description: Detects PowerShell execution using the -EncodedCommand parameter.
author: Priyanshu Raj
date: 2026-07-17
logsource:
  product: windows
  category: process_creation

detection:
  selection:
    Image|endswith: '\powershell.exe'
    CommandLine|contains: '-EncodedCommand'
  condition: selection

falsepositives:
  - Administrative automation scripts
  - Enterprise management tools

level: high

tags:
  - attack.execution
  - attack.t1059.001